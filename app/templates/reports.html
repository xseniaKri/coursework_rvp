{% extends "base.html" %}

{% block title %}Отчетность{% endblock %}

{% block content %}
<header class="header">
    <h1>Отчетность и статистика</h1>
</header>

<main class="dashboard">
    <div class="stats-grid">
        <div class="card">
            <h2>Мероприятий проведено</h2>
            <p style="font-size: 2.4rem; font-weight: 700; color: #00323C; margin: 4px 0 6px;">{{ completed_count }}</p>
        </div>
    </div>

    <section class="reports" style="margin-top: 24px;">
        <h2>Формирование отчетов</h2>
        <div class="reports-buttons">
            <button onclick="downloadReport('monthly')">Сформировать месячный отчет</button>
            <button onclick="downloadReport('employees')">Сформировать отчет по сотрудникам</button>
            <button onclick="downloadReport('structure-units')">Сформировать отчет по СП</button>
        </div>
        <p id="report-status" style="margin-top:14px; color:#999; font-size:13px;"></p>
    </section>
</main>
{% endblock %}

{% block scripts %}
<script>
async function downloadReport(type) {
    const statusEl = document.getElementById('report-status');
    statusEl.textContent = 'Формирование отчета...';
    try {
        const resp = await fetch(`/api/reports/${type}`);
        if (!resp.ok) {
            const err = await resp.json().catch(() => ({}));
            statusEl.textContent = 'Ошибка: ' + (err.detail || resp.status);
            return;
        }
        const blob = await resp.blob();
        const disposition = resp.headers.get('Content-Disposition') || '';
        const match = disposition.match(/filename="([^"]+)"/);
        const filename = match ? match[1] : `report_${type}.xlsx`;
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        a.click();
        URL.revokeObjectURL(url);
        statusEl.textContent = '';
    } catch (e) {
        statusEl.textContent = 'Ошибка при загрузке отчета';
    }
}
</script>
{% endblock %}
