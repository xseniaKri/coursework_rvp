<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карточка мероприятия</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">

    <div class="logo">
        Система мероприятий
    </div>

    <nav class="main-nav">
        <a href="#">Мероприятия</a>
        <a href="#">Отчеты</a>
        <a href="#">Панель администратора</a>
    </nav>

</header>
<header class="header">
    <h1>Создать мероприятие</h1>

    <div class="header-actions">
        <button class="secondary-btn">Назад</button>
    </div>
</header>
    <main class="event-card">

    <section class="form-section">

        <div class="grid">
            <div class="field">
                <label>Название</label>
                <input type="text">
            </div>

            <div class="field">
                <label>Описание</label>
                <textarea></textarea>
            </div>

            <div class="field">
                <label>Дата</label>
                <input type="date">
            </div>

            <div class="field">
                <label>Категория</label>
                <select></select>
            </div>

            <div class="field">
                <label>Ответственный</label>
                <select></select>
            </div>
        </div>
    </section>

    <section class="form-section">
        <h2>Документы</h2>
        <div class="grid">
            <div class="field">
                <input type="file">
            </div>
        </div>
    </section>

</main>
</body>
</html>
